<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Isses Tracker|Home</title>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="indexStyle/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav class="navbar bg-base-100 shadow-sm">
      <div class="w-[90%] mx-auto flex justify-between items-center">
        <div class="flex justify-between items-center gap-[4px]">
          <img class="w-[36px] h-[37px]" src="assets/github-logo.png" />
          <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
        </div>
        <div class="flex gap-2">
          <input
            type="text"
            placeholder="Search"
            class="input input-bordered w-24 md:w-auto"
          />
          <div class="flex-1">
            <a class="btn btn-ghost text-xl bg-blue-700 text-white"
              ><i class="fa-solid fa-plus"></i>New Issue</a
            >
          </div>
        </div>
      </div>
    </nav>
    <main class="bg-slate-50 py-[60px] px-[245px] mx-auto">
      <section>
        <div class="bg-[#ffffff] px-[24px] py-[24px] flex gap-[8px]">
          <button id="allBtn" class="btn btn-primary">All</button>
          <button id="openBtn" class="btn">Open</button>
          <button id="closeBtn" class="btn">Closed</button>
        </div>
      </section>
      <section class="mt-[16px]">
        <div
          class="bg-white flex justify-between items-center px-[24px] py-[24px]"
        >
          <div class="flex justify-between items-center gap-[8px]">
            <div
              class="w-[50px] h-[50px] bg-[#ECE4FF] rounded-full flex justify-center items-center"
            >
              <img class="w-[32px] h-[32px]" src="assets/Aperture.png" alt="" />
            </div>
            <div>
              <p class="font-semibold text-[20px]">
                <span id="issuesCount">50</span>Issues
              </p>
              <p class="text-[16px] text-[#64748B]">
                Track and manage your project issues
              </p>
            </div>
          </div>
          <div class="flex justify-between items-center gap-[16px]">
            <p><span class="text-[#00A96E]">⬤</span> Open</p>
            <p><span class="text-[#A855F7]">⬤</span> Closed</p>
          </div>
        </div>
      </section>
      <section class="bg-[#FBFBFB] px-[24px] py-[24px]">
        <div
          id="loadingSpinner"
          class="h-[60vh] flex justify-center items-center hidden"
        >
          <span class="loading loading-dots loading-xl"></span>
        </div>
        <div id="gitIssuesContainer" class="grid grid-cols-4 gap-[12px]"></div>
      </section>
      <dialog id="issue-details-modal" class="modal">
        <div class="modal-box max-w-2xl">
          <!-- Header -->
          <div class="flex justify-between items-start mb-4">
            <h3 id="modalTitle" class="text-2xl font-bold">Issue Title</h3>

            <button
              class="btn btn-sm btn-circle btn-ghost"
              onclick="issueDetailsModal.close()"
            >
              ✕
            </button>
          </div>

          <!-- Status -->
          <div class="flex items-center gap-3 mb-4">
            <span id="modalStatus" class="badge badge-success">Opened</span>
            <p class="text-gray-500 text-sm">
              Opened by <span id="modalAuthor"></span> •
              <span id="modalDate"></span>
            </p>
          </div>

          <!-- Labels -->
          <div id="modalLabels" class="flex gap-2 mb-4"></div>

          <!-- Description -->
          <p id="modalDescription" class="text-gray-600 mb-6"></p>

          <!-- Assignee + Priority -->
          <div class="bg-gray-100 p-4 rounded-lg flex justify-between mb-6">
            <div>
              <p class="text-gray-500 text-sm">Assignee:</p>
              <p id="modalAssignee" class="font-semibold"></p>
            </div>

            <div>
              <p class="text-gray-500 text-sm">Priority:</p>
              <span id="modalPriority" class="badge badge-error"></span>
            </div>
          </div>

          <!-- Close button -->
          <div class="flex justify-end">
            <button class="btn btn-primary" onclick="issueDetailsModal.close()">
              Close
            </button>
          </div>
        </div>
      </dialog>
    </main>
    <script src="indexJSFile/homePage.js"></script>
  </body>
</html>
